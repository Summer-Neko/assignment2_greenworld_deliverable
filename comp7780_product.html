<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sustainable Collection | Green World</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">GREEN WORLD.</div>
            <div class="header-right">
                <div class="cart-trigger" onclick="toggleCart()" style="cursor:pointer; position:relative;">
                    🛒 <span id="cart-count" style="background:var(--accent-gold); color:#000; border-radius:50%; padding:2px 7px; font-size:0.7rem; position:absolute; top:-10px; right:-10px;">0</span>
                </div>
                <a href="/" class="back-link" style="margin-left:30px;">Home</a>
            </div>
        </div>
    </header>

    <div class="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3>Your Selection</h3>
            <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            </div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <span>Total Amount:</span>
                <span id="cartTotal" style="color:var(--accent-gold); font-weight:bold;">$0.00</span>
            </div>
            <button class="btn-main" style="width:100%;" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <main class="container">
        <div class="product-grid" id="product-grid"></div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('greenworld_cart')) || [];

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('open');
            document.querySelector('.cart-overlay').classList.toggle('show');
            renderCart();
        }

        function addToCart(id, name, price, img) {
            const item = cart.find(i => i.id === id);
            if (item) item.qty++;
            else cart.push({ id, name, price, img, qty: 1 });
            
            localStorage.setItem('greenworld_cart', JSON.stringify(cart));
            updateCount();
            // 简单的动画提示
            showToast(`Added ${name} to cart`);
        }

        function updateCount() {
            const count = cart.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p style="color:#666; text-align:center; margin-top:50px;">Your cart is empty.</p>';
                document.getElementById('cartTotal').innerText = '$0.00';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.img}">
                    <div style="flex:1;">
                        <div style="font-size:0.9rem;">${item.name}</div>
                        <div style="color:var(--accent-gold); font-size:0.8rem;">$${item.price} x ${item.qty}</div>
                    </div>
                    <button onclick="removeItem(${item.id})" style="background:none; border:none; color:#888; cursor:pointer;">&times;</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            document.getElementById('cartTotal').innerText = `$${total.toFixed(2)}`;
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('greenworld_cart', JSON.stringify(cart));
            renderCart();
            updateCount();
        }

        function checkout() {
            alert("This will integrate with PayPal in the next step!");
        }

        // 初始化加载商品
        fetch('/api/products')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = data.map((p, index) => `
                    <article class="product-card animate-entry" style="animation-delay: ${index * 0.1}s">
                        <img src="${p.image_url}" class="product-img">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p style="color:var(--accent-gold);">$${p.price}</p>
                            <button class="btn-cart" onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.image_url}')">Add to Cart</button>
                        </div>
                    </article>
                `).join('');
            });

        updateCount();
    </script>
</body>
</html>
